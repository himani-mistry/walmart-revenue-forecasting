<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="720" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#0f172a">Forecast accuracy on held-out data</text>
  <text x="40" y="72" font-size="13.5" fill="#64748b">Validation-window MAPE &#183; lower is better &#183; scored on 19 quarters the models never saw</text>

  <!-- Gridlines -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="210" y1="108" x2="210" y2="456"/>
    <line x1="356.7" y1="108" x2="356.7" y2="456"/>
    <line x1="503.3" y1="108" x2="503.3" y2="456"/>
    <line x1="650" y1="108" x2="650" y2="456"/>
  </g>
  <g font-size="11" fill="#94a3b8" text-anchor="middle">
    <text x="210" y="474">0</text>
    <text x="356.7" y="474">10</text>
    <text x="503.3" y="474">20</text>
    <text x="650" y="474">30</text>
  </g>

  <!-- Bars: sorted best -> worst, top -> bottom -->
  <!-- 1. Auto-ARIMA 4.15 (winner) -->
  <text x="198" y="144" font-size="13.5" font-weight="600" text-anchor="end" fill="#0f172a">Auto-ARIMA</text>
  <rect x="210" y="120" width="60.9" height="38" rx="3" fill="#4f46e5"/>
  <text x="280" y="144" font-size="13.5" font-weight="700" fill="#4f46e5">4.2%</text>
  <rect x="318" y="127" width="46" height="22" rx="11" fill="#eef2ff"/>
  <text x="341" y="142" font-size="11" font-weight="600" text-anchor="middle" fill="#4f46e5">best</text>

  <!-- 2. Fixed ARIMA 4.56 -->
  <text x="198" y="202" font-size="13.5" text-anchor="end" fill="#334155">Fixed ARIMA</text>
  <rect x="210" y="178" width="66.9" height="38" rx="3" fill="#c7cdd9"/>
  <text x="286" y="202" font-size="13.5" fill="#475569">4.6%</text>

  <!-- 3. Linear trend + seasonal 8.36 -->
  <text x="198" y="260" font-size="13.5" text-anchor="end" fill="#334155">Linear trend + seasonal</text>
  <rect x="210" y="236" width="122.6" height="38" rx="3" fill="#c7cdd9"/>
  <text x="342" y="260" font-size="13.5" fill="#475569">8.4%</text>

  <!-- 4. Two-level hybrid 11.59 -->
  <text x="198" y="318" font-size="13.5" text-anchor="end" fill="#334155">Two-level hybrid</text>
  <rect x="210" y="294" width="170.0" height="38" rx="3" fill="#c7cdd9" stroke="#a5b0e8" stroke-width="1.5"/>
  <text x="389" y="318" font-size="13.5" fill="#475569">11.6%</text>

  <!-- 5. Quadratic trend + seasonal 13.14 -->
  <text x="198" y="376" font-size="13.5" text-anchor="end" fill="#334155">Quadratic trend + seasonal</text>
  <rect x="210" y="352" width="192.7" height="38" rx="3" fill="#c7cdd9"/>
  <text x="411" y="376" font-size="13.5" fill="#475569">13.1%</text>

  <!-- 6. Seasonality only 27.97 -->
  <text x="198" y="434" font-size="13.5" text-anchor="end" fill="#334155">Seasonality only</text>
  <rect x="210" y="410" width="410.2" height="38" rx="3" fill="#c7cdd9"/>
  <text x="628" y="434" font-size="13.5" fill="#475569">28.0%</text>

  <!-- Footnote -->
  <text x="40" y="503" font-size="11" fill="#94a3b8">Out-of-sample test &#183; MAPE = mean absolute percent error &#183; outlined bar = model I engineered</text>
</svg>
